<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e1e2e"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#313244" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#313244" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#313244" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#313244" stroke-width="1"/>

  <!-- Envelope icon, centered, large -->
  <g transform="translate(480, 195)">
    <rect x="0" y="0" width="240" height="160" rx="12" fill="none" stroke="#cba6f7" stroke-width="6"/>
    <polyline points="0,0 120,90 240,0" fill="none" stroke="#cba6f7" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#cdd6f4" text-anchor="middle">SES Email Adapter</text>

  <!-- Tagline -->
  <text x="600" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a6adc8" text-anchor="middle">Intelligent email routing · filtering · automation</text>

  <!-- Accent bar -->
  <rect x="480" y="548" width="240" height="4" rx="2" fill="#cba6f7"/>
</svg>
