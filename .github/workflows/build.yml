name: Build and Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ── PWA installability validation ──────────────────────────────────────────
  # Headlessly verifies the app is installable as a PWA (manifest, icons,
  # service worker, offline app shell) so regressions are caught without a
  # device. Standalone and AWS-free — it builds at the default base path '/'
  # and never touches deploy credentials.
  pwa-e2e:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run inside the official Playwright image so the browsers + OS deps are
    # already present — no 170 MB browser download per run. The tag MUST match
    # the Playwright version in package-lock.json (currently 1.59.1); bump it
    # when Playwright is upgraded, or the test will fail to find the browser.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base path '/')
        run: npm run build

      - name: Validate PWA
        run: npm run test:pwa

  # ── Responsive layout, a11y, CSP, and gesture E2E tests ─────────────────────
  # Runs the tests/e2e/ Playwright suite (layout.responsive, a11y, csp,
  # email-gesture) across the laptop/desktop/tablet/narrow/pixel/mobile viewport
  # projects in playwright.config.ts. The pwa project has its own job above, so
  # it's excluded here to avoid running it twice.
  e2e:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Tag MUST match the Playwright version in package-lock.json (currently
    # 1.59.1); bump it when Playwright is upgraded, or tests fail to find the
    # browser.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (base path '/')
        run: npm run build

      - name: Run E2E tests
        run: >
          npx playwright test
          --project=laptop --project=desktop --project=tablet
          --project=narrow --project=pixel --project=mobile

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Build, check, and deploy ───────────────────────────────────────────────
  build:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

      # ── Compute deploy target ───────────────────────────────────────────────

      - name: Set PR deploy prefix
        if: github.event_name == 'pull_request'
        run: |
          SLUG=$(echo "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g' \
            | cut -c1-63)
          echo "DEPLOY_PREFIX=pr/${SLUG}" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/pr/${SLUG}/" >> "$GITHUB_ENV"
          echo "CF_INVALIDATION_PATH=/pr/${SLUG}/*" >> "$GITHUB_ENV"
        shell: bash

      - name: Set main deploy prefix
        if: github.event_name != 'pull_request'
        run: |
          echo "DEPLOY_PREFIX=a/main/2026" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/a/" >> "$GITHUB_ENV"
          echo "CF_INVALIDATION_PATH=/a/*" >> "$GITHUB_ENV"
        shell: bash

      # ── Resolve infrastructure from OpenTofu state ──────────────────────────

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: latest

      - name: Read infra outputs from backend state
        run: |
          set -euo pipefail
          tofu -chdir=deploy init -input=false
          tofu -chdir=deploy apply -auto-approve -input=false

          SITE_BUCKET=$(tofu -chdir=deploy output -raw site_bucket_name)
          CF_ID=$(tofu -chdir=deploy output -raw cloudfront_distribution_id)
          LANDING_BUCKET=$(tofu -chdir=deploy output -raw landing_bucket_name)

          [ -n "$SITE_BUCKET" ] || { echo "::error::site_bucket_name output is empty"; exit 1; }
          [ -n "$CF_ID" ]       || { echo "::error::cloudfront_distribution_id output is empty"; exit 1; }
          [ -n "$LANDING_BUCKET" ] || { echo "::error::landing_bucket_name output is empty"; exit 1; }

          echo "SITE_BUCKET_NAME=${SITE_BUCKET}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_DISTRIBUTION_ID=${CF_ID}" >> "$GITHUB_ENV"
          echo "LANDING_BUCKET_NAME=${LANDING_BUCKET}" >> "$GITHUB_ENV"
        shell: bash
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Debug infra outputs
        run: |
          echo "=== Resolved infra values ==="
          echo "SITE_BUCKET_NAME   : ${{ env.SITE_BUCKET_NAME }}"
          echo "CF_DISTRIBUTION_ID : ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "AWS_DEFAULT_REGION : $AWS_DEFAULT_REGION"
          echo ""
          echo "=== AWS caller identity ==="
          aws sts get-caller-identity
          echo ""
          echo "=== S3 bucket existence check ==="
          aws s3api head-bucket --bucket "${{ env.SITE_BUCKET_NAME }}" 2>&1 \
            && echo "Bucket EXISTS and is accessible" \
            || echo "Bucket NOT found or no access (see error above)"
          echo ""
          echo "=== S3 buckets in account (first 20) ==="
          aws s3api list-buckets --query 'Buckets[*].Name' --output text 2>&1 | tr '\t' '\n' | head -20
        shell: bash

      # ── Lint / type-check / test ────────────────────────────────────────────

      - name: Check
        run: npm run check:ci

      - name: Format check (advisory)
        continue-on-error: true
        run: npm run format:check || true
        shell: bash

      # ── Build ─────────────────────────────────────────

      - name: Build
        run: npm run build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          BUILD_REF: ${{ github.ref_name }}
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
          VITE_API_BASE_URL: https://email.rhosys.cloud/api
          VITE_AUTHRESS_LOGIN_URL: https://login.rhosys.cloud
          VITE_AUTHRESS_APPLICATION_ID: app_2EAWGEdtzaeCj7b45DsDtt
          VITE_POSTHOG_HOST: ${{ secrets.POSTHOG_URL }}

      # ── Bundle size check (advisory — never fails the build) ───────────────

      - name: Bundle size check (advisory)
        continue-on-error: true
        run: |
          WARN_CHUNK_KB=400
          WARN_TOTAL_KB=1000
          total=0
          warned=false
          while IFS= read -r -d '' f; do
            size=$(wc -c < "$f")
            kb=$((size / 1024))
            total=$((total + size))
            if [ "$kb" -gt "$WARN_CHUNK_KB" ]; then
              echo "::warning::Large chunk: $(basename "$f") is ${kb} KB (limit ${WARN_CHUNK_KB} KB)"
              warned=true
            fi
          done < <(find dist/assets -name "*.js" -print0)
          total_kb=$((total / 1024))
          chunk_count=$(find dist/assets -name "*.js" | wc -l)
          echo "Total JS: ${total_kb} KB across ${chunk_count} chunks"
          if [ "$total_kb" -gt "$WARN_TOTAL_KB" ]; then
            echo "::warning::Total JS bundle is ${total_kb} KB (limit ${WARN_TOTAL_KB} KB)"
            warned=true
          fi
          [ "$warned" = "true" ] && echo "::notice::Review bundle size warnings above before merging." || echo "All chunks within size limits."
        shell: bash

      # ── Deploy to S3 ────────────────────────────────────────────────────────

      - name: Publish website to S3
        run: npm run deploy:website -- publish "${{ env.DEPLOY_PREFIX }}"
        env:
          SITE_BUCKET_NAME: ${{ env.SITE_BUCKET_NAME }}

      - name: Publish landing page to S3
        if: github.event_name != 'pull_request'
        run: npm run deploy:landing -- publish
        env:
          LANDING_BUCKET_NAME: ${{ env.LANDING_BUCKET_NAME }}

      - name: Invalidate CloudFront
        continue-on-error: true
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "${{ env.CF_INVALIDATION_PATH }}"
        shell: bash

      # ── Write job summary ───────────────────────────────────────────────────

      - name: Write job summary
        run: |
          PREFIX="${{ env.DEPLOY_PREFIX }}"
          if [ "$PREFIX" = "a/main/2026" ]; then
            URL="https://email.rhosys.cloud/a/"
          else
            URL="https://email.rhosys.cloud/${PREFIX}/"
          fi
          {
            echo "## Deployment summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| **URL** | [${URL}](${URL}) |"
            echo "| **S3 prefix** | \`${PREFIX}\` |"
            echo "| **Bucket** | \`${{ env.SITE_BUCKET_NAME }}\` |"
            echo "| **CloudFront** | \`${{ env.CLOUDFRONT_DISTRIBUTION_ID }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      # ── Post preview URL as PR comment ──────────────────────────────────────

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = process.env.DEPLOY_PREFIX
            const url = `https://email.rhosys.cloud/${prefix}/`
            const marker = '### Preview deployed'
            const body = `${marker}\n\n**URL:** ${url}`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(
              c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }


