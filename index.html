<!doctype html>
<html lang="en" data-theme="mocha">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SES Email Adapter</title>
    <meta
      name="description"
      content="Intelligent email routing and filtering — organise, triage, and automate your inbox with AI-powered workflows."
    />

    <!-- Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        connect-src 'self' %VITE_API_BASE_URL% %VITE_AUTHRESS_LOGIN_URL% %VITE_API_WS_URL% https://dns.google;
        font-src 'self';
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e1e2e" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://email.rhosys.cloud/" />
    <meta property="og:title" content="SES Email Adapter" />
    <meta
      property="og:description"
      content="Intelligent email routing and filtering — organise, triage, and automate your inbox with AI-powered workflows."
    />
    <meta property="og:site_name" content="SES Email Adapter" />
    <meta property="og:image" content="https://email.rhosys.cloud/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SES Email Adapter" />
    <meta
      name="twitter:description"
      content="Intelligent email routing and filtering — organise, triage, and automate your inbox with AI-powered workflows."
    />
    <meta name="twitter:image" content="https://email.rhosys.cloud/og-image.svg" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
